# pytorch_lightning==2.4.0
seed_everything: 42
trainer:
  accelerator: gpu
  strategy: auto
  devices: 1,
  num_nodes: 1
  precision: 16-mixed
  logger: null
  callbacks: null
  fast_dev_run: false
  max_epochs: 100
  min_epochs: null
  max_steps: -1
  min_steps: null
  max_time: null
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: null
  check_val_every_n_epoch: 1
  num_sanity_val_steps: null
  log_every_n_steps: null
  enable_checkpointing: null
  enable_progress_bar: null
  enable_model_summary: null
  accumulate_grad_batches: 1
  gradient_clip_val: 5
  gradient_clip_algorithm: norm
  deterministic: null
  benchmark: null
  inference_mode: true
  use_distributed_sampler: true
  profiler: null
  detect_anomaly: false
  barebones: false
  plugins: null
  sync_batchnorm: false
  reload_dataloaders_every_n_epochs: 0
  default_root_dir: null
model:
  arch:
    class_path: models.arch.DSENet.DSENet
    init_args:
      dim_input: 6
      dim_output: 2
      dim_squeeze: 8
      num_layers: 8
      num_freqs: 129
      encoder_kernel_size: 5
      dim_hidden: 192
      dim_ffn: 192
      num_heads: 4
      dropout:
      - 0.0
      - 0.0
      - 0.0
      kernel_size:
      - 5
      - 3
      conv_groups:
      - 8
      - 8
      norms:
      - LN
      - LN
      - GN
      - LN
      - LN
      - LN
      padding: zeros
      full_share: 0
      d_embedding: 40
      d_alpha: 20
      width_emb_dim: 3
      width_stage: 15
      width_control: True 
  stft:
    class_path: models.io.stft.STFT
    init_args:
      n_fft: 256
      n_hop: 128
      win_len: 256
      win: hann_window
  norm:
    class_path: models.io.norm.Norm
    init_args:
      mode: frequency
      online: true
  loss:
    class_path: models.io.loss.Loss
    init_args:
      loss_func:
        class_path: models.io.loss.MultiResolutionSTFTLoss
        init_args:
          fft_sizes:
          - 1024
          - 2048
          - 512
          hop_sizes:
          - 120
          - 240
          - 50
          win_lengths:
          - 600
          - 1200
          - 240
          window: hann_window
      pit: false
      loss_func_kwargs: {}
  optimizer:
  - Adam
  - lr: 0.001
  lr_scheduler:
  - ExponentialLR
  - gamma: 0.99
  metrics:
  - SDR
  - SI_SDR
  - NB_PESQ
  - WB_PESQ
  - eSTOI
  mchunk: null
  val_metric: loss
  write_examples: 200
  ensemble: null
  compile: false
  exp_name: exp
  reset:
  - optimizer
  - lr_scheduler
  sample_rate: 16000
  ref_channel: 0
  test_doa: -1
  test_beam: -1
  freeze: false
data:
  train_dir: null
  test_dir: null
  sample_rate: 16000
  num_workers: 4
  batch_size:
  - 4
  - 4
early_stopping:
  enable: false
  monitor: val/metric
  min_delta: 0.1
  patience: 10
  verbose: false
  mode: max
  strict: true
  check_finite: true
  stopping_threshold: null
  divergence_threshold: null
  check_on_train_epoch_end: null
  log_rank_zero_only: false
model_checkpoint:
  dirpath: null
  filename: epoch{epoch}_loss{val/metric:.4f}_neg_si_sdr{val/neg_si_sdr:.4f}
  monitor: val/metric
  verbose: false
  save_last: true
  save_top_k: -1
  save_weights_only: false
  mode: min
  auto_insert_metric_name: false
  every_n_train_steps: null
  train_time_interval: null
  every_n_epochs: 1
  save_on_train_epoch_end: null
  enable_version_counter: true
optimizer: null
lr_scheduler: null
ckpt_path: null
